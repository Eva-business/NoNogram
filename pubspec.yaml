name: first_aigame
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  image: ^4.8.0
  image_picker: ^1.2.1
  lottie: ^3.3.2
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 用來自動生成 App icon
  flutter_launcher_icons: ^0.14.3

# icon 設定
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/puzzles/easy/
    - assets/puzzles/medium/
    - assets/puzzles/hard/
    - assets/puzzles/
    - assets/lottie/
    - assets/audio/
    - assets/icon/